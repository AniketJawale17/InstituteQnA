<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Query Audit Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f4f7f2;
      --bg-2: #e8efe3;
      --ink: #1f2a24;
      --muted: #4f6258;
      --card: #ffffff;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --danger: #9f1239;
      --border: #d9e4dd;
      --shadow: 0 20px 50px rgba(25, 45, 35, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(15, 118, 110, 0.12), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(34, 197, 94, 0.12), transparent 25%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 20px;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .btn {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .card-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin: 0 0 10px;
    }

    .card-value {
      margin: 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      color: var(--ink);
    }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1300px;
    }

    thead th {
      text-align: left;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      background: #f6faf8;
    }

    tbody td {
      vertical-align: top;
      padding: 14px;
      border-bottom: 1px solid #eef3ef;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .mono {
      font-family: 'IBM Plex Mono', monospace;
      color: #38504a;
      font-size: 0.82rem;
    }

    .truncate {
      max-width: 340px;
      white-space: pre-wrap;
      word-break: break-word;
      display: -webkit-box;
      line-clamp: 4;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    @media (max-width: 1000px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .header { padding: 16px; }
      .content { padding: 12px; }
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="header">
      <div>
        <h1 class="title">Query Audit Dashboard</h1>
        <p class="subtitle">Live analytics from Azure Table Storage</p>
      </div>
      <button class="btn" id="refresh">Refresh</button>
    </section>

    <section class="content">
      <div class="cards">
        <div class="card">
          <p class="card-label">Total Queries</p>
          <p class="card-value" id="totalQueries">0</p>
        </div>
        <div class="card">
          <p class="card-label">Avg Answer Chars</p>
          <p class="card-value" id="avgAnswer">0</p>
        </div>
        <div class="card">
          <p class="card-label">Avg Context Chars</p>
          <p class="card-value" id="avgContext">0</p>
        </div>
        <div class="card">
          <p class="card-label">Latest Query Time</p>
          <p class="card-value mono" id="latestTime">-</p>
        </div>
        <div class="card">
          <p class="card-label">Success Rate</p>
          <p class="card-value" id="successRate">0%</p>
        </div>
        <div class="card">
          <p class="card-label">Avg Latency (ms)</p>
          <p class="card-value" id="avgLatency">0</p>
        </div>
      </div>

      <div id="error" class="error"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date Time (UTC)</th>
              <th>Status</th>
              <th>Latency (ms)</th>
              <th>Request Id</th>
              <th>Client IP</th>
              <th>Model</th>
              <th>Query</th>
              <th>Answer</th>
              <th>Context</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const rowsEl = document.getElementById('rows');
    const totalQueriesEl = document.getElementById('totalQueries');
    const avgAnswerEl = document.getElementById('avgAnswer');
    const avgContextEl = document.getElementById('avgContext');
    const latestTimeEl = document.getElementById('latestTime');
    const successRateEl = document.getElementById('successRate');
    const avgLatencyEl = document.getElementById('avgLatency');
    const refreshBtn = document.getElementById('refresh');
    const errorEl = document.getElementById('error');

    function escapeHtml(input) {
      return String(input || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderRows(rows) {
      if (!rows || rows.length === 0) {
        rowsEl.innerHTML = '<tr><td colspan="9">No query rows found in Azure Table yet.</td></tr>';
        return;
      }

      rowsEl.innerHTML = rows.map((row) => `
        <tr>
          <td class="mono">${escapeHtml(row.created_at || '-')}</td>
          <td class="mono">${escapeHtml(row.status_code || '-')}</td>
          <td class="mono">${escapeHtml(row.processing_ms || 0)}</td>
          <td class="mono">${escapeHtml(row.request_id || '-')}</td>
          <td class="mono">${escapeHtml(row.client_ip || '-')}</td>
          <td class="mono">${escapeHtml((row.model_provider || '-') + ' / ' + (row.model_name || '-'))}</td>
          <td><div class="truncate">${escapeHtml(row.query)}</div></td>
          <td><div class="truncate">${escapeHtml(row.answer)}</div></td>
          <td><div class="truncate">${escapeHtml(row.context)}</div></td>
        </tr>
      `).join('');
    }

    async function loadDashboardData() {
      errorEl.textContent = '';
      try {
        const response = await fetch('/api/dashboard/query-logs?limit=200');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const summary = data.summary || {};

        totalQueriesEl.textContent = String(summary.total_queries || 0);
        avgAnswerEl.textContent = String(summary.avg_answer_chars || 0);
        avgContextEl.textContent = String(summary.avg_context_chars || 0);
        latestTimeEl.textContent = summary.latest_query_time || '-';
        successRateEl.textContent = `${String(summary.success_rate_percent || 0)}%`;
        avgLatencyEl.textContent = String(summary.avg_processing_ms || 0);

        renderRows(data.rows || []);
      } catch (error) {
        errorEl.textContent = `Failed to load dashboard data: ${error.message}`;
      }
    }

    refreshBtn.addEventListener('click', loadDashboardData);
    loadDashboardData();
  </script>
</body>
</html>
